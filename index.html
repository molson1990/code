<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:380px;
    background:#fff;
    padding:35px;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
    text-align:center;
}

h2{
    color:#333;
    margin-bottom:10px;
}

p{
    color:#666;
    font-size:14px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
    margin-bottom:15px;
    outline:none;
}

input:focus{
    border-color:#0d6efd;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:#fff;
    border:none;
    border-radius:6px;
    font-size:15px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#0b5ed7;
}

#error{
    color:#dc3545;
    font-size:14px;
    margin-top:15px;
    display:none;
}
</style>
</head>

<body>

<div class="container">
    <h2>Secure Access</h2>
    <p>Please enter the access code to continue.</p>

    <input type="password" id="code" placeholder="Enter access code">

    <button onclick="checkCode()">Continue</button>

    <div id="error">Incorrect access code.</div>
</div>

<script>
const ACCESS_CODE = "2026";
const REDIRECT_URL = "https://28372637449474427282923024392832534253207625423425345.com";

function checkCode() {
    const entered = document.getElementById("code").value;

    if (entered === ACCESS_CODE) {
        window.location.href = REDIRECT_URL;
    } else {
        document.getElementById("error").style.display = "block";
        document.getElementById("code").value = "";
        document.getElementById("code").focus();
    }
}

document.getElementById("code").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        checkCode();
    }
});
</script>

</body>
</html>
